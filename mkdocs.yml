site_name: Ac-Wiki 大学生的百科全书
site_url: https://ac-wiki.org # 正式站点链接
site_description: 属于大学生群体的真·青年大学习
site_author: Ac-Wiki
repo_name: Ac-Wiki
repo_url: https://github.com/Ac-Wiki/Ac-Wiki
edit_uri: edit/main/docs/
# copyright:

theme:
    language: zh
    name: material
    font:
        text: Noto Sans
    custom_dir: ./src/overrides
    logo: https://avatars.githubusercontent.com/u/185591372?s=200&v=4
    favicon: https://avatars.githubusercontent.com/u/185591372?s=40&v=4
    features:
        - toc.follow # Follow TOC
        - content.action.edit # source edit
        - content.action.view # source view
        - content.tooltips
        - navigation.instant # Instant navigation
        - navigation.instant.progress
        - navigation.top # Top navigation
        - navigation.footer
        - navigation.indexes
        - navigation.tabs
        - navigation.tabs.sticky
        - navigation.sections
        - search.suggest
        - search.highlight
        - search.share
    palette:
        # auto switch between light and dark mode
        - media: "(prefers-color-scheme)"
          toggle:
              icon: material/refresh-auto
              name: 切换到浅色模式
        # match system theme color
        - media: "(prefers-color-scheme: light)"
          scheme: default
          toggle:
              icon: material/weather-sunny
              name: 切换到深色模式
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          toggle:
              icon: material/weather-night
              name: 根据系统主题切换
    footer:
        - icon: material/account-group
          link: community-hub/about-wiki.md
          name: 关于 Wiki
        - icon: material/pencil
          link: community-hub/CONTRIBUTING.md
          name: 贡献指南
        - icon: material/email
          link: community-hub/contact-us.md
          name: 联系我们

extra:
    generator: false
    social:
        - icon: simple/qq
          link: https://qm.qq.com/q/WJI3hgBcm4
          name: QQ 群组
        - icon: simple/telegram
          link: https://t.me/AcWiki
          name: Telegram 频道
    analytics:
        provider: custom
        feedback:
            title: "本页面对您有帮助吗？"
            ratings:
                - icon: material/thumb-up-outline
                  name: 有帮助
                  data: 1
                  note: >-
                      感谢您的反馈！
                - icon: material/thumb-down-outline
                  name: 有待改进
                  data: 0
                  note: >-
                      请 <a href="https://t.me/AcWiki" target="_blank" rel="noopener">加入频道</a> 或 <a href="https://github.com/Ac-Wiki/Ac-Wiki/issues/new?template=Blank+issue" target="_blank" rel="noopener">发起Issue</a><br>告诉我们如何改进！

extra_css:
    - assets/stylesheets/extra.css

extra_javascript:
    - assets/javascripts/feedback.js
    - https://cn.vercount.one/js
    - assets/javascripts/mathjax.js
    - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
    - assets/javascripts/404.js

markdown_extensions:
    - abbr
    - attr_list
    - admonition #强调块
    - footnotes #脚注
    - md_in_html #支持在 html 中使用 markdown 语法
    - toc:
          permalink: true
    - tables
    - pymdownx.details
    - pymdownx.betterem
    - pymdownx.superfences
    - pymdownx.critic
    - pymdownx.caret
    - pymdownx.keys
    - pymdownx.mark
    - pymdownx.tilde
    - pymdownx.arithmatex:
          generic: true
    - pymdownx.emoji:
          emoji_index: !!python/name:material.extensions.emoji.twemoji
          emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
    - search:
          lang: zh
          separator: '[\s\u200b\-]'
          jieba_dict: ./src/overrides/assets/dict.txt
    - git-revision-date-localized: # commit/Modify date
          timezone: Asia/Shanghai
          enable_creation_date: true
          type: timeago
    - git-committers:
          enabled: !ENV [CI, false] # 仅在 CI 环境下启用
          repository: Ac-Wiki/Ac-Wiki
          branch: main
          token: !ENV GITHUB_TOKEN
          exclude_committers:
              - github-actions[bot]
              - actions-user
              - Copilot
              - web-flow
    - glightbox: # lightbox
          touchNavigation: true
          loop: true
          effect: none
          slide_effect: fade
          width: auto
          height: auto
          zoomable: true
          draggable: true
          skip_classes:
              - skip-lightbox
          auto_caption: false
          caption_position: bottom
          background: none
          shadow: false
          manual: false
    - privacy:
          assets: false # 图片等大量资源托管在 GitHub 上，开启可能会触发 API 请求的限制
    - blog
    - rss:
          match_path: "blog/posts/.*"
          date_from_meta:
              as_creation: date.created
              as_update: date.updated
    - tags
